apiVersion: apps/v1
kind: Deployment
metadata:
  name: case-management-api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: case-management-api
  template:
    metadata:
      labels:
        app: case-management-api
    spec:
      containers:
        - name: case-management-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: DATABASE_URL
              value: "{{ .Values.database.url }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: case-management-api
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: case-management-api
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP