apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ml-scoring-scaler
  namespace: fraud-detection
spec:
  scaleTargetRef:
    name: ml-scoring
  minReplicaCount: 1
  maxReplicaCount: 6
  cooldownPeriod:  30
  pollingInterval: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: fraud-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
        consumerGroup:    ml-scoring-group
        topic:            transactions-scored
        lagThreshold:     "10"
        offsetResetPolicy: latest